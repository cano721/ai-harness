name: fix-bug
description: 버그를 분석하고 수정합니다
trigger_keywords: ["버그 수정", "에러 해결", "fix", "debug"]

context:
  required:
    - ".ai-harness/context-map.md"
  optional:
    - ".ai-harness/teams/{team}/skills/convention-{team}.md"

phases:
  - name: diagnose
    agent: "{project}-developer"
    description: "에러 재현 + 근본 원인 분석"
    steps:
      - "에러 메시지, 스택트레이스, 재현 조건 파악"
      - "관련 코드 분석 → 원인 특정"
    output: "diagnosis"

  - name: fix
    agent: "{project}-developer"
    description: "최소 범위로 수정 + 재현 케이스 테스트 작성"
    input: "diagnosis"
    steps:
      - "최소 범위 수정 (관련 없는 코드 변경 금지)"
      - "재현 케이스를 테스트로 작성"
      - "기존 테스트 전체 실행"
    output: "fix-result"

  - name: review
    agent: "{project}-reviewer"
    description: "수정 범위 적절성 + 회귀 위험 검토"
    input: "fix-result"
    enforce_separation: true
    output: "review-result"

  - name: regression
    agent: "{project}-developer"
    description: "리뷰 반영 + 회귀 테스트 확인"
    input: "review-result"
    condition: "review-result.has_issues"

verification:
  - "에러가 더 이상 재현되지 않음"
  - "재현 케이스가 테스트로 추가됨"
  - "기존 테스트 전체 통과"
  - "수정 범위가 최소한으로 유지됨"

orchestration:
  default: "skill"
  enhanced: "omc-team"
