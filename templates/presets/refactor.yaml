# 리팩토링 프리셋
# 에이전트가 리팩토링 시 안전하게 작업하도록 가이드합니다.
name: refactor
description: 코드를 리팩토링합니다 (기능 변경 없이 구조 개선)
trigger_keywords: ["리팩토링", "refactor", "코드 정리", "구조 개선"]

context:
  required:
    - ".ai-harness/context-map.md"
    - ".ai-harness/teams/{team}/skills/convention-{team}.md"
  optional: []

steps:
  - name: "1. 현재 테스트 확인"
    description: "기존 테스트 전체 실행 → 기준선 확보"
    depends_on: []

  - name: "2. 변경 계획"
    description: "변경 범위와 방법을 사용자에게 보고"
    depends_on: ["1"]

  - name: "3. 단계별 리팩토링"
    description: "작은 단위로 수정 → 각 단계마다 테스트 확인"
    depends_on: ["2"]

  - name: "4. 전체 검증"
    description: "모든 테스트 통과 + 아키텍처 경계 준수 확인"
    depends_on: ["3"]

verification:
  - "기능 변경 없음 (테스트 결과 동일)"
  - "아키텍처 경계 준수"
  - "컨벤션 일치"
  - "불필요한 코드 추가 없음"
