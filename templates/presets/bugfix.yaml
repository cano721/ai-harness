# 버그 수정 프리셋
# 에이전트가 버그를 수정할 때 최적의 컨텍스트와 작업 순서를 제공합니다.
name: bugfix
description: 버그를 분석하고 수정합니다
trigger_keywords: ["버그 수정", "에러 해결", "fix", "debug"]

context:
  required:
    - ".ai-harness/context-map.md"
  optional:
    - ".ai-harness/teams/{team}/skills/convention-{team}.md"

steps:
  - name: "1. 에러 재현 확인"
    description: "에러 메시지, 스택트레이스, 재현 조건 파악"
    depends_on: []

  - name: "2. 근본 원인 분석"
    description: "관련 코드 Read → 원인 특정"
    depends_on: ["1"]

  - name: "3. 수정"
    description: "최소 범위로 수정 (관련 없는 코드 변경 금지)"
    depends_on: ["2"]

  - name: "4. 테스트"
    description: "재현 케이스를 테스트로 작성 → 수정 후 통과 확인"
    depends_on: ["3"]

  - name: "5. 회귀 확인"
    description: "기존 테스트 전체 실행"
    depends_on: ["4"]

verification:
  - "에러가 더 이상 재현되지 않음"
  - "재현 케이스가 테스트로 추가됨"
  - "기존 테스트 전체 통과"
  - "수정 범위가 최소한으로 유지됨"
