_schema_version: 1

# 프로젝트 정보 (init 시 Claude가 분석하여 채움)
project:
  name: ""
  domain: ""
  description: ""
  entities: []
  tech_stack: []
  base_package: ""

teams: []
guardrails:
  max_files_changed: 20
  max_execution_minutes: 30
hooks:
  block-dangerous:
    enabled: true
  secret-scanner:
    enabled: true
  audit-logger:
    enabled: true
  check-architecture:
    enabled: true
architecture:
  layers:
    - name: Types/Entity
      patterns: ["dto", "entity", "model", "domain", "type", "vo", "enum"]
    - name: Config
      patterns: ["config", "configuration", "properties"]
    - name: Repository
      patterns: ["repository", "repo", "dao", "mapper", "persistence"]
    - name: Service
      patterns: ["service", "usecase", "application"]
    - name: Controller
      patterns: ["controller", "rest", "api", "endpoint", "resource"]
  direction: "Types/Entity → Config → Repository → Service → Controller"
rules:
  test_coverage: 80
