_schema_version: 2

# 프로젝트 정보 (init 시 Claude가 분석하여 채움)
project:
  name: ""
  domain: ""
  description: ""
  entities: []
  tech_stack: []
  base_package: ""

teams: []

# [v2] AI 에이전트 (프로젝트를 이해하는 맞춤 에이전트)
agents:
  generated: []
  # 예시:
  # - name: myapp-developer
  #   path: .ai-harness/agents/myapp-developer.md
  #   teams: [backend, frontend]

# [v2] 워크플로우 패턴 (AI 활용 최적화)
workflow:
  pattern: ""
  # pipeline | fan-out-fan-in | producer-reviewer | supervisor
  path: .ai-harness/workflow.md

guardrails:
  max_files_changed: 20
  max_execution_minutes: 30
hooks:
  block-dangerous:
    enabled: true
  secret-scanner:
    enabled: true
  audit-logger:
    enabled: true
  guardrails-check:
    enabled: true
rules:
  test_coverage: 80
