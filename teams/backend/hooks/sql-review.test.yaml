name: sql-review
tests:
  - name: "SELECT * 차단"
    tool: "Write"
    input: "String sql = \"SELECT * FROM users\";"
    expect_exit: 2
    expect_output_contains: "BLOCKED"

  - name: "SELECT id,name FROM 통과"
    tool: "Write"
    input: "String sql = \"SELECT id, name FROM users WHERE id = ?\";"
    expect_exit: 0

  - name: "문자열 연결 SQL 차단"
    tool: "Write"
    input: "String sql = \"SELECT id FROM users WHERE name = '\" + userName + \"'\";"
    expect_exit: 2
    expect_output_contains: "BLOCKED"

  - name: "PreparedStatement 통과"
    tool: "Write"
    input: "PreparedStatement ps = conn.prepareStatement(\"SELECT id FROM users WHERE name = ?\"); ps.setString(1, userName);"
    expect_exit: 0

  - name: "WHERE 없는 SELECT 경고 (통과)"
    tool: "Edit"
    input: "SELECT id, name FROM users"
    expect_exit: 0
    expect_output_contains: "WARNING"

  - name: "Read 도구는 검사하지 않음"
    tool: "Read"
    input: "SELECT * FROM users"
    expect_exit: 0
