name: secret-scanner
tests:
  - name: "AWS Access Key 차단"
    tool: "Write"
    input: "const key = 'AKIAIOSFODNN7EXAMPLE1'"
    expect_exit: 2
    expect_output_contains: "BLOCKED"

  - name: "Private Key 차단"
    tool: "Edit"
    input: "-----BEGIN RSA PRIVATE KEY-----\nMIIE..."
    expect_exit: 2
    expect_output_contains: "BLOCKED"

  - name: "하드코딩 password 차단"
    tool: "Write"
    input: "password = 'SuperSecret123!'"
    expect_exit: 2
    expect_output_contains: "BLOCKED"

  - name: "하드코딩 api_key 차단"
    tool: "Write"
    input: "api_key: 'sk-1234567890abcdef'"
    expect_exit: 2
    expect_output_contains: "BLOCKED"

  - name: ".env 파일 쓰기 차단"
    tool: "Write"
    input: ".env"
    expect_exit: 2
    expect_output_contains: "BLOCKED"

  - name: ".env.local 파일 쓰기 차단"
    tool: "Write"
    input: ".env.local"
    expect_exit: 2
    expect_output_contains: "BLOCKED"

  - name: "정상 코드 통과"
    tool: "Write"
    input: "const greeting = 'hello world';"
    expect_exit: 0

  - name: "Read 도구는 검사하지 않음"
    tool: "Read"
    input: "AKIAIOSFODNN7EXAMPLE1"
    expect_exit: 0

  - name: "EXAMPLE_ 접두사는 허용"
    tool: "Write"
    input: "EXAMPLE_API_KEY=\"test12345678\""
    expect_exit: 0
